<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FINRATE - Investment Bank</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== Theme ===== */
:root {
    --bg: #061826;
    --card: rgba(255,255,255,0.06);
    --stroke: rgba(255,255,255,0.1);

    --primary: #00A896;
    --accent: #02C39A;
    --blue: #028090;

    --text: #EAF2F8;
    --muted: #9fb3c8;
}

/* ===== Base ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Cairo', sans-serif;
    background: radial-gradient(circle at top, #0b2a3a, var(--bg));
    color: var(--text);
    overflow-x: hidden;
}

/* ===== NAV ===== */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 18px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;

    background: rgba(10,20,30,0.6);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--stroke);
    z-index: 1000;
}

.logo {
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
}

.btn-login {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn-login:hover {
    transform: scale(1.05);
}

/* ===== HERO ===== */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 20px;
}

.hero h1 {
    font-size: 56px;
    font-weight: 700;
}

.hero p {
    margin-top: 15px;
    color: var(--muted);
    font-size: 18px;
}

.hero-buttons {
    margin-top: 30px;
    display: flex;
    gap: 15px;
    justify-content: center;
}

.primary {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border: none;
    padding: 12px 22px;
    border-radius: 12px;
    color: white;
    cursor: pointer;
}

.secondary {
    background: transparent;
    border: 1px solid var(--stroke);
    padding: 12px 22px;
    border-radius: 12px;
    color: var(--text);
    cursor: pointer;
}

/* ===== STATS ===== */
.stats {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 20px;
    max-width: 1000px;
    margin: auto;
    padding: 80px 20px;
}

.stat {
    background: var(--card);
    border: 1px solid var(--stroke);
    padding: 25px;
    border-radius: 16px;
    text-align: center;
}

.stat h2 {
    color: var(--accent);
}

/* ===== FEATURES ===== */
.features {
    padding: 80px 20px;
    text-align: center;
}

.features h2 {
    font-size: 32px;
}

.grid {
    margin-top: 40px;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 20px;
}

.card {
    background: var(--card);
    border: 1px solid var(--stroke);
    padding: 25px;
    border-radius: 16px;
}

/* ===== FOOTER ===== */
footer {
    padding: 40px;
    text-align: center;
    color: var(--muted);
    border-top: 1px solid var(--stroke);
    margin-top: 60px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
    .hero h1{font-size:32px;}
    .stats{grid-template-columns:1fr;}
    .grid{grid-template-columns:1fr;}
    .navbar{padding:15px 20px;}
}

</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
    <div class="logo">FINRATE</div>
    <button class="btn-login">تسجيل الدخول</button>
</div>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>منصة استثمار ذكية لتحليل الفائدة</h1>
        <p>نحو قرارات مالية أدق باستخدام الذكاء والتحليل الاقتصادي</p>

        <div class="hero-buttons">
            <button class="primary">ابدأ الآن</button>
            <button class="secondary">تعرف أكثر</button>
        </div>
    </div>
</section>

<!-- STATS -->
<section class="stats">
    <div class="stat">
        <h2>+95%</h2>
        <p>دقة التوقع</p>
    </div>

    <div class="stat">
        <h2>AI</h2>
        <p>تحليل ذكي</p>
    </div>

    <div class="stat">
        <h2>24/7</h2>

> H:
<p>تحديث لحظي</p>
    </div>
</section>

<!-- FEATURES -->
<section class="features">
    <h2>لماذا FINRATE؟</h2>

    <div class="grid">
        <div class="card">تحليل مالي احترافي</div>
        <div class="card">توقعات بأسلوب AI</div>
        <div class="card">واجهة بنك استثماري</div>
    </div>
</section>

<footer>
    © FINRATE - Investment Platform
</footer>

</body>
</html>
